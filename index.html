<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет смен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Стили для анимации плавного перелистывания страниц */
        .tab-content {
            transition: opacity 0.25s ease, transform 0.25s ease;
            opacity: 0;
            transform: translateY(10px);
            display: none;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        /* Убираем системный скроллбар, чтобы интерфейс выглядел как нативное приложение */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen pb-6 select-none">

    <div class="bg-blue-600 text-white px-4 py-2.5 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-base font-bold">Мой Журнал Смен</h1>
        <span id="user-display" class="text-xs opacity-90 bg-blue-700 px-2 py-1 rounded-md font-medium">Загрузка...</span>
    </div>

    <div class="flex bg-white border-b border-gray-200 sticky top-[44px] z-40 shadow-sm">
        <button onclick="switchTab('input-tab')" id="btn-input-tab" class="w-1/2 py-2.5 text-center text-sm font-bold border-b-2 border-blue-600 text-blue-600 focus:outline-none transition-all duration-200">
            📝 Новая смена
        </button>
        <button onclick="switchTab('history-tab')" id="btn-history-tab" class="w-1/2 py-2.5 text-center text-sm font-medium border-b-2 border-transparent text-gray-500 focus:outline-none transition-all duration-200">
            📊 История и Статистика
        </button>
    </div>

    <div class="max-w-md mx-auto p-3">
        
        <div id="input-tab" class="tab-content active">
            <form id="shift-form" onsubmit="submitForm(event)" class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Дата смены</label>
                    <input type="date" id="date" required class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-gray-50">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Одометр старт</label>
                        <input type="number" id="odo_start" step="0.1" min="0" required placeholder="0.0" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Одометр конец</label>
                        <input type="number" id="odo_end" step="0.1" min="0" required placeholder="0.0" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Топливо (литры)</label>
                        <input type="number" id="fuel_add" step="0.1" min="0" required value="0" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Заказы (шт)</label>
                        <input type="number" id="orders" min="0" required placeholder="0" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Фактическое время (часы)</label>
                    <input type="number" id="raw_hours" step="0.1" min="0.1" max="24" required placeholder="Например: 8.4 или 9.5" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white text-sm font-bold py-2.5 rounded-lg shadow hover:bg-blue-700 active:transform active:scale-[0.98] transition-all focus:outline-none mt-2">
                    💾 Сохранить смену
                </button>
            </form>
        </div>

        <div id="history-tab" class="tab-content">
            
            <div class="bg-white p-3 rounded-xl shadow-sm space-y-2">
                <div class="flex items-center justify-between border-b pb-1.5">
                    <button onclick="changeYear(-1)" class="px-3 py-1 text-blue-600 font-bold text-base focus:outline-none">◀️</button>
                    <span id="current-year-display" class="font-bold text-base text-gray-700">2026 год</span>
                    <button onclick="changeYear(1)" class="px-3 py-1 text-blue-600 font-bold text-base focus:outline-none">▶️</button>
                </div>
                <div class="grid grid-cols-2 gap-1.5" id="months-grid">
                    </div>
            </div>

            <div id="month-summary" class="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-4 rounded-xl shadow-sm grid grid-cols-2 gap-3 hidden">
                <div>
                    <p class="text-[10px] opacity-75 uppercase font-bold tracking-wider">Общая ЗП</p>
                    <p id="sum-salary" class="text-lg font-black mt-0.5">0.00 руб</p>
                </div>
                <div>
                    <p class="text-[10px] opacity-75 uppercase font-bold tracking-wider">Рабочих дней</p>
                    <p id="sum-days" class="text-lg font-black mt-0.5">0 дней</p>
                </div>
                <div>
                    <p class="text-[10px] opacity-75 uppercase font-bold tracking-wider">Общие часы</p>
                    <p id="sum-hours" class="text-lg font-black mt-0.5">0.0 ч</p>
                </div>
                <div>
                    <p class="text-[10px] opacity-75 uppercase font-bold tracking-wider">Ср. ЗП за смену</p>
                    <p id="sum-avg" class="text-lg font-black mt-0.5">0.00 руб</p>
                </div>
            </div>

            <div id="shifts-container" class="space-y-2.5">
                <p class="text-center text-xs text-gray-500 py-4">Выберите месяц выше для загрузки данных...</p>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Синхронизируем работу с ТГ и открываем приложение на максимум
        tg.ready();
        tg.expand();
        
        // ВНИМАНИЕ: Сюда впишите ссылку на ваш бэкенд на Render!
        const API_BASE_URL = 'https://ваш-бэкенд.onrender.com'; 

        // Стабильное извлечение Имени + Фамилии из Telegram
        const user = tg.initDataUnsafe?.user;
        let userName = "Водитель"; 

        if (user && user.first_name) {
            userName = user.first_name;
            if (user.last_name) {
                userName += ` ${user.last_name}`;
            }
        }

        const userId = user?.id || 123456789;
        document.getElementById('user-display').innerText = userName;

        const now = new Date();
        let selectedYear = now.getFullYear();
        let selectedMonth = now.getMonth() + 1; 

        document.getElementById('date').value = now.toISOString().split('T')[0];

        const RU_MONTHS_FULL = [
            "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
            "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
        ];

        function renderMonthsGrid() {
            document.getElementById('current-year-display').innerText = `${selectedYear} год`;
            const grid = document.getElementById('months-grid');
            grid.innerHTML = '';
            
            RU_MONTHS_FULL.forEach((mName, index) => {
                const mNum = index + 1;
                const btn = document.createElement('button');
                btn.innerText = mName;
                
                if (mNum === selectedMonth) {
                    btn.className = "py-1.5 text-xs font-bold rounded-lg bg-blue-600 text-white focus:outline-none shadow-sm transition-all";
                } else {
                    btn.className = "py-1.5 text-xs font-medium rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 focus:outline-none transition-all";
                }
                
                btn.onclick = () => {
                    selectedMonth = mNum;
                    renderMonthsGrid();
                    loadHistory();
                };
                grid.appendChild(btn);
            });
        }

        function changeYear(offset) {
            selectedYear += offset;
            renderMonthsGrid();
            loadHistory();
        }

        // Плавная анимация переключения вкладок
        function switchTab(tabId) {
            const activeContent = document.querySelector('.tab-content.active');
            const targetContent = document.getElementById(tabId);
            
            if (activeContent && activeContent.id === tabId) return;

            // Сначала убираем активный класс (запускается CSS opacity/transform увядание)
            if (activeContent) {
                activeContent.classList.remove('active');
            }

            // Ждем завершения анимации увядания, затем показываем новую вкладку
            setTimeout(() => {
                document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
                targetContent.style.display = 'block';
                
                // Микро-таймаут для того, чтобы браузер успел применить display: block перед добавлением анимации
                setTimeout(() => {
                    targetContent.classList.add('active');
                }, 20);
            }, 150);

            // Смена стилей кнопок навигации
            if (tabId === 'input-tab') {
                document.getElementById('btn-input-tab').className = "w-1/2 py-2.5 text-center text-sm font-bold border-b-2 border-blue-600 text-blue-600 focus:outline-none";
                document.getElementById('btn-history-tab').className = "w-1/2 py-2.5 text-center text-sm font-medium border-b-2 border-transparent text-gray-500 focus:outline-none";
            } else {
                document.getElementById('btn-history-tab').className = "w-1/2 py-2.5 text-center text-sm font-bold border-b-2 border-blue-600 text-blue-600 focus:outline-none";
                document.getElementById('btn-input-tab').className = "w-1/2 py-2.5 text-center text-sm font-medium border-b-2 border-transparent text-gray-500 focus:outline-none";
                renderMonthsGrid();
                loadHistory();
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            
            const rawDate = document.getElementById('date').value; 
            const [y, m, d] = rawDate.split('-');
            const formattedDate = `${d}.${m}.${y}`;

            let rawHours = parseFloat(document.getElementById('raw_hours').value);
            
            // Округление строго в меньшую сторону до кратного 0.5
            rawHours = Math.floor(rawHours * 2) / 2;

            const payload = {
                user_id: userId,
                date: formattedDate,
                odo_start: parseFloat(document.getElementById('odo_start').value),
                odo_end: parseFloat(document.getElementById('odo_end').value),
                fuel_add: parseFloat(document.getElementById('fuel_add').value),
                raw_hours: rawHours,
                orders: parseInt(document.getElementById('orders').value)
            };

            if (payload.odo_start < 0 || payload.odo_end < 0 || payload.fuel_add < 0 || payload.orders < 0) {
                tg.showAlert("❌ Значения полей не могут быть отрицательными!");
                return;
            }
            if (payload.odo_end < payload.odo_start) {
                tg.showAlert(`❌ Нелогично: Конечный одометр меньше начального (${payload.odo_start})!`);
                return;
            }
            if (payload.raw_hours <= 0 || payload.raw_hours > 24) {
                tg.showAlert("❌ Округленное время смены должно быть от 0.5 до 24 часов!");
                return;
            }

            tg.MainButton.setText("Отправка смены...").show().disable();

            try {
                const response = await fetch(`${API_BASE_URL}/api/save_shift`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    tg.showAlert(`🎉 Смена успешно сохранена!\nЧасы округлены вниз: ${rawHours} ч.`);
                    document.getElementById('shift-form').reset();
                    document.getElementById('date').value = now.toISOString().split('T')[0];
                } else {
                    tg.showAlert(`❌ Ошибка: ${result.error}`);
                }
            } catch (error) {
                tg.showAlert("❌ Ошибка сети.");
            } finally {
                tg.MainButton.hide();
            }
        }

        async function loadHistory() {
            const container = document.getElementById('shifts-container');
            container.innerHTML = '<p class="text-center text-xs text-gray-500 py-6">⏳ Загрузка смен...</p>';
            document.getElementById('month-summary').classList.add('hidden');

            const paddedMonth = String(selectedMonth).padStart(2, '0');

            try {
                const response = await fetch(`${API_BASE_URL}/api/get_stats?user_id=${userId}&year=${selectedYear}&month=${paddedMonth}`);
                const resData = await response.json();

                if (!response.ok || resData.status === 'empty') {
                    container.innerHTML = `<p class="text-center text-xs text-gray-500 py-6">${resData.message || 'Записей нет.'}</p>`;
                    return;
                }

                const s = resData.summary;
                document.getElementById('sum-salary').innerText = `${s.total_salary} руб`;
                document.getElementById('sum-days').innerText = `${s.days_count} дн.`;
                document.getElementById('sum-hours').innerText = `${s.total_hours} ч.`;
                document.getElementById('sum-avg').innerText = `${s.avg_salary} руб`;
                document.getElementById('month-summary').classList.remove('hidden');

                container.innerHTML = '';
                resData.shifts.forEach((shift) => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center";
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5">
                            <p class="font-bold text-sm text-gray-900">${shift.date}</p>
                            <p class="text-gray-500">🏎️ Пробег: <span class="font-semibold text-gray-700">${shift.distance} км</span></p>
                            <p class="text-gray-500">⏱️ Время: <span class="font-semibold text-gray-700">${shift.hours_calculated} ч</span></p>
                            <p class="text-gray-500">📦 Заказы: <span class="font-semibold text-gray-700">${shift.orders} шт</span></p>
                            <p class="text-sm text-green-600 font-bold mt-0.5">💰 ${shift.salary} руб.</p>
                        </div>
                        <button onclick="deleteShift(${shift.id}, '${shift.date}')" class="text-red-500 hover:text-red-700 p-2 focus:outline-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = '<p class="text-center text-xs text-red-500 py-6">❌ Ошибка подключения.</p>';
            }
        }

        function deleteShift(shiftId, dateStr) {
            tg.showConfirm(`Вы действительно хотите удалить смену за ${dateStr}?`, async (confirmed) => {
                if (confirmed) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/delete_shift/${shiftId}?user_id=${userId}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) {
                            tg.showPopup({ message: "🗑️ Запись удалена" });
                            loadHistory();
                        } else {
                            tg.showAlert("❌ Не удалось удалить.");
                        }
                    } catch (error) {
                        tg.showAlert("❌ Сетевая ошибка.");
                    }
                }
            });
        }
    </script>
</body>
</html>
